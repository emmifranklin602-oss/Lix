<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureSocial</title>
<style>
  body { margin:0; font-family:-apple-system,sans-serif; background:#111; color:#fff; }
  .container { height:100vh; display:flex; flex-direction:column; background:#075E54; }
  .header { background:#128C7E; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
  .content { flex:1; overflow-y:auto; padding:10px; background:#E5DDD5; color:#000; }
  .card { background:#fff; border-radius:12px; padding:15px; margin:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
  .hidden { display:none !important; }
  input, button { width:100%; padding:14px; margin:8px 0; border-radius:25px; border:none; font-size:16px; }
  button { background:#25D366; color:white; cursor:pointer; font-weight:bold; }
  button:hover { background:#128C7E; }
  .message { margin:10px 0; padding:12px 16px; border-radius:18px; max-width:80%; word-wrap:break-word; }
  .sent { background:#DCF8C6; align-self:flex-end; margin-left:auto; border-bottom-right-radius:4px; }
  .received { background:#fff; align-self:flex-start; margin-right:auto; border-bottom-left-radius:4px; }
  .meta { font-size:11px; color:#666; margin-top:4px; }
  .bottom-nav { background:#075E54; display:flex; justify-content:space-around; padding:10px 0; position:fixed; bottom:0; width:100%; }
  .bottom-nav button { background:none; color:#fff; border:none; flex:1; font-size:14px; }
  .bottom-nav button.active { color:#25D366; font-weight:bold; }
  #recaptcha-container { height: 0; width: 0; }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getAuth,
    signInWithPhoneNumber,
    RecaptchaVerifier,
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHSDsfR9SBlYaemSLDL6Z2qNR1x0QREuM",
    authDomain: "social-d0b33.firebaseapp.com",
    databaseURL: "https://social-d0b33-default-rtdb.firebaseio.com",
    projectId: "social-d0b33",
    storageBucket: "social-d0b33.appspot.com",
    messagingSenderId: "1004582299104",
    appId: "1:1004582299104:web:fc4679e9ced235c0ea3785"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);

  let confirmationResult = null;
  let currentUserPhone = null;

  // Show screen
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  // Phone OTP
  window.sendCode = async () => {
    const phone = document.getElementById('phone').value.trim();
    if (!phone.startsWith('+')) return alert("Use format +234XXXXXXXXXX");

    try {
      const recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
        size: 'invisible'
      });
      await recaptchaVerifier.render(); // ensure it's rendered
      confirmationResult = await signInWithPhoneNumber(auth, phone, recaptchaVerifier);
      alert("Code sent! Check your SMS.");
      showScreen('otpScreen');
    } catch (e) {
      alert("Error sending code: " + e.message + "\n\nIf this persists, try again or use a different number.");
    }
  };

  window.verifyCode = async () => {
    const code = document.getElementById('otp').value.trim();
    if (!code) return alert("Enter the 6-digit code");

    try {
      const result = await confirmationResult.confirm(code);
      currentUserPhone = result.user.phoneNumber;
      set(ref(db, "users/" + result.user.uid), { phone: currentUserPhone });
      alert("Login successful!");
      showScreen('dashboardScreen');
    } catch (e) {
      alert("Wrong code or expired. Try sending again.");
    }
  };

  // ... (rest of your functions: startPrivateChat, sendMessage, postVideo, etc. – add them here if needed)

  onAuthStateChanged(auth, user => {
    if (user) {
      currentUserPhone = user.phoneNumber;
      showScreen('dashboardScreen');
    }
  });
</script>
</head>

<body>

<div class="container">

  <!-- PHONE LOGIN -->
  <div id="phoneScreen" class="screen card">
    <h3>Enter your phone number</h3>
    <input id="phone" placeholder="+234XXXXXXXXXX" type="tel">
    <button onclick="sendCode()">Send Code</button>
    <div id="recaptcha-container"></div>
  </div>

  <!-- OTP -->
  <div id="otpScreen" class="screen card hidden">
    <h3>Enter the 6-digit code</h3>
    <input id="otp" placeholder="123456" maxlength="6" type="number">
    <button onclick="verifyCode()">Verify & Enter App</button>
  </div>

  <!-- DASHBOARD (add your other screens here) -->
  <div id="dashboardScreen" class="screen card hidden">
    <h3>Welcome to SecureSocial</h3>
    <p>You are logged in with phone: <b id="userPhone"></b></p>
    <!-- Add your chat, video, community buttons here -->
    <button onclick="signOut(auth)">Logout</button>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button onclick="showScreen('phoneScreen')">Home</button>
    <button onclick="showScreen('chatScreen')">Chat</button>
    <button onclick="showScreen('storiesScreen')">Stories</button>
    <button onclick="showScreen('newsScreen')">News</button>
  </div>

</div>

</body>
</html>
