<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureSocial</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#1e3c72;
color:white;
margin:0;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:12px;
margin-top:20px;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#4f6df5;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#3448c5;
}

.hidden{
display:none;
}

.message{
background:#eee;
padding:8px;
border-radius:6px;
margin-top:6px;
}

video{
width:100%;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>SecureSocial</h2>

<!-- AUTH SCREEN -->

<div id="authScreen" class="card">

<h3>Login / Sign Up</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

</div>


<!-- DASHBOARD -->

<div id="dashboard" class="card hidden">

<h3>Dashboard</h3>

<button onclick="openChat()">Chat</button>
<button onclick="openGroups()">Groups</button>
<button onclick="openVideos()">Videos</button>
<button onclick="logout()">Logout</button>

</div>


<!-- CHAT -->

<div id="chatScreen" class="card hidden">

<h3>Global Chat</h3>

<div id="chatMessages"></div>

<input id="chatInput" placeholder="Message">
<button onclick="sendMessage()">Send</button>

<button onclick="goHome()">Back</button>

</div>


<!-- GROUPS -->

<div id="groupScreen" class="card hidden">

<h3>Groups</h3>

<input id="groupName" placeholder="Group name">
<button onclick="createGroup()">Create Group</button>

<div id="groupList"></div>

<button onclick="goHome()">Back</button>

</div>


<!-- VIDEOS -->

<div id="videoScreen" class="card hidden">

<h3>Videos</h3>

<input id="videoURL" placeholder="Paste video URL">
<button onclick="postVideo()">Post Video</button>

<div id="videoFeed"></div>

<button onclick="goHome()">Back</button>

</div>


</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getDatabase,ref,set,push,onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyAHSDsfR9SBlYaemSLDL6Z2qNR1x0QREuM",
authDomain: "social-d0b33.firebaseapp.com",
databaseURL:"https://social-d0b33-default-rtdb.firebaseio.com",
projectId: "social-d0b33",
storageBucket: "social-d0b33.appspot.com",
messagingSenderId: "1004582299104",
appId: "1:1004582299104:web:fc4679e9ced235c0ea3785"

};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);



function show(id){

document.getElementById("authScreen").classList.add("hidden");
document.getElementById("dashboard").classList.add("hidden");
document.getElementById("chatScreen").classList.add("hidden");
document.getElementById("groupScreen").classList.add("hidden");
document.getElementById("videoScreen").classList.add("hidden");

document.getElementById(id).classList.remove("hidden");

}



window.signup = function(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,pass)

.then((user)=>{

set(ref(db,"users/"+user.user.uid),{
email:email
});

alert("Account created");

})

.catch(e=>alert(e.message))

}



window.login = function(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,pass)

.catch(e=>alert(e.message))

}



window.logout = function(){

signOut(auth)

}



onAuthStateChanged(auth,(user)=>{

if(user){

show("dashboard");

}else{

show("authScreen");

}

})



/* CHAT */

window.openChat=function(){

show("chatScreen")

const chatRef=ref(db,"chat")

onValue(chatRef,(snap)=>{

let data=snap.val()

let html=""

for(let id in data){

html+="<div class='message'>"+data[id].text+"</div>"

}

document.getElementById("chatMessages").innerHTML=html

})

}



window.sendMessage=function(){

let msg=document.getElementById("chatInput").value

push(ref(db,"chat"),{

text:msg

})

document.getElementById("chatInput").value=""

}



/* GROUPS */

window.openGroups=function(){

show("groupScreen")

const groupRef=ref(db,"groups")

onValue(groupRef,(snap)=>{

let data=snap.val()

let html=""

for(let id in data){

html+="<div class='message'>"+data[id].name+"</div>"

}

document.getElementById("groupList").innerHTML=html

})

}



window.createGroup=function(){

let name=document.getElementById("groupName").value

push(ref(db,"groups"),{

name:name

})

document.getElementById("groupName").value=""

}



/* VIDEOS */

window.openVideos=function(){

show("videoScreen")

const videoRef=ref(db,"videos")

onValue(videoRef,(snap)=>{

let data=snap.val()

let html=""

for(let id in data){

html+="<video controls src='"+data[id].url+"'></video>"

}

document.getElementById("videoFeed").innerHTML=html

})

}



window.postVideo=function(){

let url=document.getElementById("videoURL").value

push(ref(db,"videos"),{

url:url

})

document.getElementById("videoURL").value=""

}



window.goHome=function(){

show("dashboard")

}

</script>

</body>
</html>
