<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureSocial</title>
<style>
  body{margin:0;font-family:-apple-system,sans-serif;background:#111;color:#fff}
  .container{height:100vh;display:flex;flex-direction:column;background:#075E54}
  .header{background:#128C7E;padding:15px;text-align:center;font-size:20px;font-weight:bold}
  .content{flex:1;overflow-y:auto;padding:10px;background:#E5DDD5;color:#000}
  .card{background:#fff;border-radius:12px;padding:15px;margin:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
  .hidden{display:none!important}
  input,button{width:100%;padding:14px;margin:8px 0;border-radius:25px;border:none;font-size:16px}
  button{background:#25D366;color:white;cursor:pointer;font-weight:bold}
  button:hover{background:#128C7E}
  .message{margin:10px 0;padding:12px 16px;border-radius:18px;max-width:80%;word-wrap:break-word}
  .sent{background:#DCF8C6;align-self:flex-end;margin-left:auto;border-bottom-right-radius:4px}
  .received{background:#fff;align-self:flex-start;margin-right:auto;border-bottom-left-radius:4px}
  .meta{font-size:11px;color:#666;margin-top:4px}
  .bottom-nav{background:#075E54;display:flex;justify-content:space-around;padding:10px 0;position:fixed;bottom:0;width:100%}
  .bottom-nav button{background:none;color:#fff;border:none;flex:1;font-size:14px}
  .bottom-nav button.active{color:#25D366;font-weight:bold}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, signInWithPhoneNumber, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHSDsfR9SBlYaemSLDL6Z2qNR1x0QREuM",
  authDomain: "social-d0b33.firebaseapp.com",
  databaseURL: "https://social-d0b33-default-rtdb.firebaseio.com",
  projectId: "social-d0b33",
  storageBucket: "social-d0b33.appspot.com",
  messagingSenderId: "1004582299104",
  appId: "1:1004582299104:web:fc4679e9ced235c0ea3785"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

let confirmationResult = null;
let currentUserPhone = null;

// Show screen
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// Phone OTP (exactly like WhatsApp)
window.sendCode = async () => {
  const phone = document.getElementById('phone').value.trim();
  if (!phone) return alert("Enter phone number with country code (+234...)");
  try {
    const recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {size: 'invisible'});
    confirmationResult = await signInWithPhoneNumber(auth, phone, recaptchaVerifier);
    showScreen('otpScreen');
  } catch (e) { alert("Error sending code: " + e.message); }
};

window.verifyCode = async () => {
  const code = document.getElementById('otp').value.trim();
  try {
    const result = await confirmationResult.confirm(code);
    currentUserPhone = result.user.phoneNumber;
    set(ref(db, "users/" + result.user.uid), {phone: currentUserPhone});
    showScreen('dashboardScreen');
    startRealtime();
  } catch (e) { alert("Wrong code. Try again."); }
};

// Start realtime updates (fixed - now works instantly)
function startRealtime() {
  // Community
  onValue(ref(db, 'community'), snap => {
    let html = '';
    const data = snap.val() || {};
    for (let key in data) {
      html += `<div class="message received">\( {data[key].text}<div class="meta"> \){new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
    }
    document.getElementById('communityMessages').innerHTML = html;
    document.getElementById('communityMessages').scrollTop = 999999;
  });
  // Videos
  onValue(ref(db, 'videos'), snap => {
    let html = '';
    const data = snap.val() || {};
    for (let key in data) {
      html += `<video controls src="${data[key].url}" style="width:100%;margin:10px 0;border-radius:10px"></video>`;
    }
    document.getElementById('videoFeed').innerHTML = html;
  });
}

// Private chat by number
window.startPrivateChat = () => {
  const phone = document.getElementById('contactPhone').value.trim();
  if (!phone) return alert("Enter phone number");
  const roomId = [currentUserPhone, phone].sort().join('_');
  showScreen('privateChatScreen');
  document.getElementById('privateChatTitle').textContent = "Chat with " + phone;
};

window.sendPrivateMessage = () => {
  const text = document.getElementById('privateInput').value.trim();
  if (!text) return;
  const phone = document.getElementById('contactPhone').value.trim();
  const roomId = [currentUserPhone, phone].sort().join('_');
  push(ref(db, 'chats/' + roomId), {text});
  document.getElementById('privateInput').value = '';
};

// Community
window.sendCommunityMessage = () => {
  const text = document.getElementById('communityInput').value.trim();
  if (text) push(ref(db, 'community'), {text});
  document.getElementById('communityInput').value = '';
};

// Stories
window.postStory = () => {
  const text = document.getElementById('storyInput').value.trim();
  if (text) push(ref(db, 'stories'), {text, time: Date.now()});
  document.getElementById('storyInput').value = '';
};

// News + AI
window.postNews = () => {
  const title = document.getElementById('newsTitle').value.trim();
  if (title) push(ref(db, 'news'), {title});
  document.getElementById('newsTitle').value = '';
};
window.aiPostNews = () => {
  const aiNews = ["Breaking: New AI tool helps students pass exams!", "Nigeria launches free internet for students", "Crypto prices rise again today!"];
  const random = aiNews[Math.floor(Math.random()*aiNews.length)];
  push(ref(db, 'news'), {title: "🤖 AI News: " + random});
};

// Video upload (fixed)
window.postVideo = async () => {
  const file = document.getElementById('videoFile').files[0];
  if (!file) return alert("Select a video first");
  document.getElementById('uploadMsg').innerHTML = "Uploading...";
  const path = `videos/\( {Date.now()}_ \){file.name}`;
  const fileRef = sRef(storage, path);
  await uploadBytes(fileRef, file);
  const url = await getDownloadURL(fileRef);
  push(ref(db, 'videos'), {url});
  document.getElementById('uploadMsg').innerHTML = "✅ Video uploaded!";
  document.getElementById('videoFile').value = '';
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if (user) {
    currentUserPhone = user.phoneNumber;
    showScreen('dashboardScreen');
    startRealtime();
  }
});
</script>
</head>

<body>

<div class="container">

  <!-- PHONE LOGIN -->
  <div id="phoneScreen" class="screen card">
    <h3>Enter your phone number</h3>
    <input id="phone" placeholder="+234XXXXXXXXXX" type="tel">
    <button onclick="sendCode()">Send Code</button>
    <div id="recaptcha-container"></div>
  </div>

  <!-- OTP -->
  <div id="otpScreen" class="screen card hidden">
    <h3>Enter the code sent to you</h3>
    <input id="otp" placeholder="123456" maxlength="6">
    <button onclick="verifyCode()">Verify Code</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardScreen" class="screen card hidden">
    <h3>Welcome to SecureSocial</h3>
    <button onclick="showScreen('contactScreen')">💬 New Chat (type number)</button>
    <button onclick="showScreen('communityScreen')">🌍 Community</button>
    <button onclick="showScreen('storiesScreen')">📖 Stories</button>
    <button onclick="showScreen('newsScreen')">📰 News</button>
    <button onclick="showScreen('videoScreen')">📹 Videos</button>
    <button onclick="logout()" style="background:#e74c3c">Logout</button>
  </div>

  <!-- NEW CHAT -->
  <div id="contactScreen" class="screen card hidden">
    <h3>Add Person by Number</h3>
    <input id="contactPhone" placeholder="+234XXXXXXXXXX">
    <button onclick="startPrivateChat()">Start Private Chat</button>
    <button onclick="showScreen('dashboardScreen')">Back</button>
  </div>

  <!-- PRIVATE CHAT -->
  <div id="privateChatScreen" class="screen card hidden">
    <h3 id="privateChatTitle">Private Chat</h3>
    <div id="privateMessages" style="min-height:60vh"></div>
    <input id="privateInput" placeholder="Type message">
    <button onclick="sendPrivateMessage()">Send</button>
    <button onclick="showScreen('dashboardScreen')">Back</button>
  </div>

  <!-- COMMUNITY -->
  <div id="communityScreen" class="screen card hidden">
    <h3>Community Chat</h3>
    <div id="communityMessages" style="min-height:60vh"></div>
    <input id="communityInput" placeholder="Type message">
    <button onclick="sendCommunityMessage()">Send</button>
    <button onclick="showScreen('dashboardScreen')">Back</button>
  </div>

  <!-- STORIES -->
  <div id="storiesScreen" class="screen card hidden">
    <h3>Stories</h3>
    <input id="storyInput" placeholder="Write a short story...">
    <button onclick="postStory()">Post Story</button>
    <button onclick="showScreen('dashboardScreen')">Back</button>
  </div>

  <!-- NEWS -->
  <div id="newsScreen" class="screen card hidden">
    <h3>News Feed</h3>
    <input id="newsTitle" placeholder="Post news here...">
    <button onclick="postNews()">Post News</button>
    <button onclick="aiPostNews()">🤖 AI Post News</button>
    <button onclick="showScreen('dashboardScreen')">Back</button>
  </div>

  <!-- VIDEOS -->
  <div id="videoScreen" class="screen card hidden">
    <h3>Videos</h3>
    <input id="videoFile" type="file" accept="video/*">
    <button onclick="postVideo()">Upload Video</button>
    <div id="uploadMsg"></div>
    <div id="videoFeed"></div>
    <button onclick="showScreen('dashboardScreen')">Back</button>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <button onclick="showScreen('dashboardScreen')">Home</button>
    <button onclick="showScreen('communityScreen')">Community</button>
    <button onclick="showScreen('storiesScreen')">Stories</button>
    <button onclick="showScreen('newsScreen')">News</button>
  </div>

</div>

</body>
</html>
