<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok-Style App</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<style>
/* --- TikTok-style CSS --- */
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
  font-family: Arial, sans-serif;
  overflow: hidden;
}
#feed {
  height: 100%;
  width: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}
.post {
  position: relative;
  height: 100vh;
  width: 100%;
  scroll-snap-align: start;
  display: flex;
  justify-content: center;
  align-items: flex-end;
}
.post video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.overlay-right {
  position: absolute;
  right: 10px;
  bottom: 100px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;
  color: #fff;
}
.overlay-right img {
  width: 50px;
  height: 50px;
  border-radius: 25px;
}
.overlay-left {
  position: absolute;
  left: 10px;
  bottom: 20px;
  color: #fff;
}
.overlay-left b {
  display: block;
  margin-bottom: 5px;
}
.bottom-nav {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 60px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: rgba(0,0,0,0.3);
}
.bottom-nav button {
  background: none;
  border: none;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
}
.login-panel {
  position: absolute;
  top: 0; left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap:10px;
}
.login-panel input {
  padding:10px;
  width:200px;
  border-radius:5px;
  border:none;
}
.login-panel button {
  padding:10px 20px;
  border-radius:5px;
  border:none;
  background:#fe2c55;
  color:#fff;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- Login / Signup -->
<div id="loginPanel" class="login-panel">
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="username" placeholder="Username">
  <input id="profile-pic" type="file">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- Feed -->
<div id="feed"></div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button>Home</button>
  <button>Discover</button>
  <button>Upload</button>
  <button>Inbox</button>
  <button>Profile</button>
</div>

<script>
// --- Firebase Config ---
const firebaseConfig = {
  apiKey: "AIzaSyDz-wDVbDfnkTiidCZ_F_m6aOQ2Ma0rKxA",
  authDomain: "social-entairtanment-app.firebaseapp.com",
  projectId: "social-entairtanment-app",
  storageBucket: "social-entairtanment-app.firebasestorage.app",
  messagingSenderId: "487474123400",
  appId: "1:487474123400:web:3f76d1db007a9380d8453d",
  measurementId: "G-2SZFBP0HSW"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// ---------- Auth ----------
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const username = document.getElementById("username").value;
  const profilePic = document.getElementById("profile-pic").files[0];

  auth.createUserWithEmailAndPassword(email,password)
    .then(cred=>{
      const uid = cred.user.uid;
      if(profilePic){
        const ref = storage.ref("profiles/"+uid);
        ref.put(profilePic).then(()=>ref.getDownloadURL().then(url=>{
          db.collection("users").doc(uid).set({username,email,profilePic:url});
        }));
      } else { db.collection("users").doc(uid).set({username,email}); }
      document.getElementById("loginPanel").style.display="none";
    }).catch(e=>alert(e.message));
}

function login(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;
  auth.signInWithEmailAndPassword(email,password)
    .then(cred=>{
      document.getElementById("loginPanel").style.display="none";
    }).catch(e=>alert(e.message));
}

// ---------- Posts / Feed ----------
function renderFeed(){
  const feed=document.getElementById("feed");
  db.collection("posts").orderBy("time","desc").onSnapshot(snapshot=>{
    feed.innerHTML="";
    snapshot.forEach(doc=>{
      const data=doc.data();
      const div=document.createElement("div");
      div.className="post";
      let mediaElem=document.createElement(data.media?.endsWith(".mp4")?"video":"img");
      mediaElem.src=data.media;
      if(data.media?.endsWith(".mp4")) mediaElem.autoplay=true, mediaElem.loop=true, mediaElem.muted=true, mediaElem.playsInline=true;
      div.appendChild(mediaElem);
      // Right overlay
      const overlayR=document.createElement("div");
      overlayR.className="overlay-right";
      let pfp=document.createElement("img");
      pfp.src=data.profilePic||"";
      overlayR.appendChild(pfp);
      let likeBtn=document.createElement("button"); likeBtn.innerText="♥ "+(data.likes||0); overlayR.appendChild(likeBtn);
      let commentBtn=document.createElement("button"); commentBtn.innerText="💬 "+(data.comments||0); overlayR.appendChild(commentBtn);
      div.appendChild(overlayR);
      // Left overlay
      const overlayL=document.createElement("div");
      overlayL.className="overlay-left";
      overlayL.innerHTML=`<b>@${data.username||"User"}</b>${data.caption||""}<br>🎵 ${data.song||""}`;
      div.appendChild(overlayL);
      feed.appendChild(div);
    });
  });
}
renderFeed();

// ---------- Upload Sample ----------
function uploadPost(file,caption="Sample",song="Unknown"){
  const user = auth.currentUser;
  if(!user || !file) return;
  const ref = storage.ref("posts/"+Date.now()+"-"+file.name);
  ref.put(file).then(()=>ref.getDownloadURL().then(url=>{
    db.collection("posts").add({
      media:url,
      username:user.email,
      caption,
      song,
      profilePic:"",
      time:Date.now(),
      likes:0,
      comments:0
    });
  }));
}
</script>

</body>
</html>
