<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureSocial</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#075E54; color:white; height:100vh; }
    .container { height:100%; display:flex; flex-direction:column; }
    .header { background:#128C7E; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
    .content { flex:1; overflow-y:auto; padding:10px; background:#E5DDD5; color:#000; }
    .card { background:white; border-radius:12px; padding:20px; margin:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .hidden { display:none !important; }
    input, button { width:100%; padding:14px; margin:10px 0; border-radius:25px; border:none; font-size:16px; box-sizing:border-box; }
    button { background:#25D366; color:white; cursor:pointer; font-weight:bold; }
    button:hover { background:#128C7E; }
    .message { margin:10px 0; padding:12px 16px; border-radius:18px; max-width:80%; background:#DCF8C6; align-self:flex-end; margin-left:auto; }
    .bottom-nav { background:#075E54; display:flex; justify-content:space-around; padding:10px 0; position:fixed; bottom:0; width:100%; border-top:1px solid #128C7E; }
    .bottom-nav button { background:none; color:white; border:none; flex:1; font-size:14px; }
  </style>
</head>

<body>

<div class="container">

  <div class="header">SecureSocial</div>

  <!-- AUTH -->
  <div id="authScreen" class="card">
    <h3>Login or Sign Up</h3>
    <input id="email" placeholder="Email" type="email">
    <input id="password" type="password" placeholder="Password (6+ chars)">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
    <div id="msg" style="color:red; text-align:center; margin-top:10px;"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardScreen" class="card hidden">
    <h3>Welcome!</h3>
    <button onclick="showScreen('chatScreen')">Chat</button>
    <button onclick="showScreen('videoScreen')">Videos</button>
    <button onclick="logout()" style="background:#e74c3c;">Logout</button>
  </div>

  <!-- CHAT -->
  <div id="chatScreen" class="card hidden">
    <h3>Chat</h3>
    <div id="chatMessages" style="min-height:70vh;"></div>
    <input id="chatInput" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
    <button onclick="showScreen('dashboardScreen')">Back</button>
  </div>

  <!-- VIDEOS -->
  <div id="videoScreen" class="card hidden">
    <h3>Videos</h3>
    <input id="videoFile" type="file" accept="video/*">
    <button onclick="postVideo()">Upload</button>
    <div id="uploadMsg" style="text-align:center; color:green;"></div>
    <div id="videoFeed"></div>
    <button onclick="showScreen('dashboardScreen')">Back</button>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button onclick="showScreen('dashboardScreen')">Home</button>
    <button onclick="showScreen('chatScreen')">Chat</button>
    <button onclick="showScreen('videoScreen')">Videos</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHSDsfR9SBlYaemSLDL6Z2qNR1x0QREuM",
    authDomain: "social-d0b33.firebaseapp.com",
    databaseURL: "https://social-d0b33-default-rtdb.firebaseio.com",
    projectId: "social-d0b33",
    storageBucket: "social-d0b33.appspot.com",
    messagingSenderId: "1004582299104",
    appId: "1:1004582299104:web:fc4679e9ced235c0ea3785"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);

  function showScreen(id) {
    document.querySelectorAll('.card').forEach(el => el.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  window.signup = async () => {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    const msg = document.getElementById('msg');
    try {
      await createUserWithEmailAndPassword(auth, email, pass);
      msg.style.color = "green";
      msg.textContent = "Account created! Login now.";
    } catch (e) {
      msg.textContent = e.message;
    }
  };

  window.login = async () => {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    const msg = document.getElementById('msg');
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
      msg.textContent = "Login failed: " + e.message;
    }
  };

  window.logout = () => signOut(auth);

  onAuthStateChanged(auth, user => {
    if (user) {
      showScreen('dashboardScreen');
      startRealtime();
    } else {
      showScreen('authScreen');
    }
  });

  function startRealtime() {
    onValue(ref(db, 'chat'), snap => {
      let html = '';
      const data = snap.val() || {};
      for (let key in data) {
        html += `<div class="message sent">\( {data[key].text}<div class="meta"> \){new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
      }
      document.getElementById('chatMessages').innerHTML = html;
      document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
    });

    onValue(ref(db, 'videos'), snap => {
      let html = '';
      const data = snap.val() || {};
      for (let key in data) {
        html += `<video controls src="${data[key].url}" style="width:100%;margin:10px 0;border-radius:10px"></video>`;
      }
      document.getElementById('videoFeed').innerHTML = html;
    });
  }

  window.sendMessage = () => {
    const text = document.getElementById('chatInput').value.trim();
    if (text) {
      push(ref(db, 'chat'), { text });
      document.getElementById('chatInput').value = '';
    }
  };

  window.postVideo = async () => {
    const file = document.getElementById('videoFile').files[0];
    if (!file) return alert("Choose a video");
    document.getElementById('uploadMsg').textContent = "Uploading...";
    try {
      const path = `videos/\( {Date.now()}_ \){file.name}`;
      const fileRef = sRef(storage, path);
      await uploadBytes(fileRef, file);
      const url = await getDownloadURL(fileRef);
      push(ref(db, 'videos'), { url });
      document.getElementById('uploadMsg').textContent = "Uploaded!";
      document.getElementById('videoFile').value = '';
    } catch (e) {
      document.getElementById('uploadMsg').textContent = "Failed: " + e.message;
    }
  };
</script>

</body>
</html>
