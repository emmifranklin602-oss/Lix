<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureSocial</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#075E54; color:white; }
    .container { height:100vh; display:flex; flex-direction:column; }
    .header { background:#128C7E; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
    .content { flex:1; overflow-y:auto; padding:10px; background:#E5DDD5; color:#000; }
    .card { background:white; border-radius:12px; padding:20px; margin:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .hidden { display:none !important; }
    input, button { width:100%; padding:14px; margin:10px 0; border-radius:25px; border:none; font-size:16px; box-sizing:border-box; }
    button { background:#25D366; color:white; cursor:pointer; font-weight:bold; }
    button:hover { background:#128C7E; }
    .message { margin:10px 0; padding:12px 16px; border-radius:18px; max-width:80%; word-wrap:break-word; }
    .sent { background:#DCF8C6; align-self:flex-end; margin-left:auto; border-bottom-right-radius:4px; }
    .received { background:#fff; align-self:flex-start; margin-right:auto; border-bottom-left-radius:4px; }
    .meta { font-size:11px; color:#666; margin-top:4px; text-align:right; }
    .bottom-nav { background:#075E54; display:flex; justify-content:space-around; padding:10px 0; position:fixed; bottom:0; width:100%; border-top:1px solid #128C7E; }
    .bottom-nav button { background:none; color:white; border:none; flex:1; font-size:14px; }
    .bottom-nav button.active { color:#25D366; font-weight:bold; }
    #recaptcha-container { height:0; visibility:hidden; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import {
      getAuth,
      RecaptchaVerifier,
      signInWithPhoneNumber,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAHSDsfR9SBlYaemSLDL6Z2qNR1x0QREuM",
      authDomain: "social-d0b33.firebaseapp.com",
      databaseURL: "https://social-d0b33-default-rtdb.firebaseio.com",
      projectId: "social-d0b33",
      storageBucket: "social-d0b33.appspot.com",
      messagingSenderId: "1004582299104",
      appId: "1:1004582299104:web:fc4679e9ced235c0ea3785"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const storage = getStorage(app);

    let confirmationResult = null;

    // Create invisible reCAPTCHA verifier
    const recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
      size: 'invisible',
      callback: () => console.log('reCAPTCHA verified'),
      'expired-callback': () => console.log('reCAPTCHA expired')
    });

    // Send OTP code
    window.sendCode = async () => {
      const phone = document.getElementById('phone').value.trim();
      if (!phone.startsWith('+')) return alert("Use international format: +234XXXXXXXXXX");

      try {
        await recaptchaVerifier.render(); // prepare reCAPTCHA
        confirmationResult = await signInWithPhoneNumber(auth, phone, recaptchaVerifier);
        document.getElementById('phoneScreen').classList.add('hidden');
        document.getElementById('otpScreen').classList.remove('hidden');
      } catch (error) {
        alert("Error sending code: " + error.message);
        console.error(error);
      }
    };

    // Verify OTP code
    window.verifyCode = async () => {
      const code = document.getElementById('otp').value.trim();
      if (code.length !== 6) return alert("Enter 6-digit code");

      try {
        const result = await confirmationResult.confirm(code);
        alert("Login successful! Welcome.");
        document.getElementById('otpScreen').classList.add('hidden');
        document.getElementById('dashboardScreen').classList.remove('hidden');
        startRealtime(); // start chat/video listeners
      } catch (error) {
        alert("Wrong code: " + error.message);
      }
    };

    // Logout
    window.logout = () => signOut(auth);

    // Realtime chat & video listener
    function startRealtime() {
      onValue(ref(db, 'chat'), snap => {
        let html = '';
        const data = snap.val() || {};
        for (let key in data) {
          html += `<div class="message sent">\( {data[key].text}<div class="meta"> \){new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div></div>`;
        }
        document.getElementById('chatMessages').innerHTML = html;
        document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
      });

      onValue(ref(db, 'videos'), snap => {
        let html = '';
        const data = snap.val() || {};
        for (let key in data) {
          html += `<video controls src="${data[key].url}" style="width:100%;margin:10px 0;border-radius:10px"></video>`;
        }
        document.getElementById('videoFeed').innerHTML = html;
      });
    }

    // Send chat message
    window.sendMessage = () => {
      const text = document.getElementById('chatInput').value.trim();
      if (text) {
        push(ref(db, 'chat'), { text });
        document.getElementById('chatInput').value = '';
      }
    };

    // Upload video
    window.postVideo = async () => {
      const file = document.getElementById('videoFile').files[0];
      if (!file) return alert("Select a video first");

      document.getElementById('uploadMsg').textContent = "Uploading...";
      try {
        const path = `videos/\( {Date.now()}_ \){file.name}`;
        const fileRef = sRef(storage, path);
        await uploadBytes(fileRef, file);
        const url = await getDownloadURL(fileRef);
        push(ref(db, 'videos'), { url });
        document.getElementById('uploadMsg').textContent = "Video uploaded!";
        document.getElementById('videoFile').value = '';
      } catch (e) {
        document.getElementById('uploadMsg').textContent = "Upload failed: " + e.message;
      }
    };

    // Simple screen switch
    window.showScreen = (id) => {
      document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    };
  </script>
</head>

<body>

<div class="container">

  <div class="header">SecureSocial</div>

  <!-- PHONE LOGIN -->
  <div id="phoneScreen" class="card">
    <h3>Enter your phone number</h3>
    <input id="phone" placeholder="+234XXXXXXXXXX" type="tel">
    <button onclick="sendCode()">Send Code</button>
    <div id="recaptcha-container"></div>
  </div>

  <!-- OTP VERIFICATION -->
  <div id="otpScreen" class="card hidden">
    <h3>Enter the code</h3>
    <input id="otp" placeholder="6-digit code" maxlength="6">
    <button onclick="verifyCode()">Verify Code</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardScreen" class="card hidden">
    <h3>Welcome!</h3>
    <button onclick="showScreen('chatScreen')">Chat</button>
    <button onclick="showScreen('videoScreen')">Videos</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- CHAT -->
  <div id="chatScreen" class="card hidden">
    <h3>Chat</h3>
    <div id="chatMessages"></div>
    <input id="chatInput" placeholder="Type a message">
    <button onclick="sendMessage()">Send</button>
    <button onclick="showScreen('dashboardScreen')">Back</button>
  </div>

  <!-- VIDEOS -->
  <div id="videoScreen" class="card hidden">
    <h3>Videos</h3>
    <input id="videoFile" type="file" accept="video/*">
    <button onclick="postVideo()">Upload Video</button>
    <div id="uploadMsg"></div>
    <div id="videoFeed"></div>
    <button onclick="showScreen('dashboardScreen')">Back</button>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <button onclick="showScreen('dashboardScreen')">Home</button>
    <button onclick="showScreen('chatScreen')">Chat</button>
    <button onclick="showScreen('videoScreen')">Videos</button>
  </div>

</div>

</body>
</html>
